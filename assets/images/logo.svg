<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 420" width="440" height="420">
  <defs>
    <!-- Sky gradient - warm neutral -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e0d8"/>
      <stop offset="50%" stop-color="#f5f0eb"/>
      <stop offset="100%" stop-color="#faf8f5"/>
    </linearGradient>
    
    <!-- Concrete/Beige Building Gradient -->
    <linearGradient id="concreteFacade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4c4b0"/>
      <stop offset="20%" stop-color="#e0d4c4"/>
      <stop offset="40%" stop-color="#e8dccf"/>
      <stop offset="60%" stop-color="#d8ccbc"/>
      <stop offset="80%" stop-color="#c4b4a0"/>
      <stop offset="100%" stop-color="#b8a892"/>
    </linearGradient>
    
    <linearGradient id="concreteSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a09080"/>
      <stop offset="100%" stop-color="#8a7a6a"/>
    </linearGradient>
    
    <!-- Brick/Brown Building Gradient -->
    <linearGradient id="brickFacade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a08060"/>
      <stop offset="25%" stop-color="#b09070"/>
      <stop offset="50%" stop-color="#c4a882"/>
      <stop offset="75%" stop-color="#a08060"/>
      <stop offset="100%" stop-color="#8b7355"/>
    </linearGradient>
    
    <linearGradient id="brickSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6b5544"/>
      <stop offset="100%" stop-color="#5a4030"/>
    </linearGradient>
    
    <!-- Roof gradients -->
    <linearGradient id="roofBrown" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a4030"/>
      <stop offset="100%" stop-color="#3a2a1a"/>
    </linearGradient>
    
    <linearGradient id="roofBeige" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b7355"/>
      <stop offset="100%" stop-color="#6b5544"/>
    </linearGradient>
    
    <!-- Window gradients -->
    <linearGradient id="windowWarm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4c4b0"/>
      <stop offset="30%" stop-color="#9a8a7a"/>
      <stop offset="70%" stop-color="#7a6a5a"/>
      <stop offset="100%" stop-color="#5a4a3a"/>
    </linearGradient>
    
    <linearGradient id="windowLit" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f0eb"/>
      <stop offset="50%" stop-color="#d4c4b0"/>
      <stop offset="100%" stop-color="#a08060"/>
    </linearGradient>
    
    <linearGradient id="windowDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a4a3a"/>
      <stop offset="100%" stop-color="#3a2a1a"/>
    </linearGradient>
    
    <!-- Crane steel gradient -->
    <linearGradient id="craneSteel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9a8a7a"/>
      <stop offset="30%" stop-color="#c4b4a0"/>
      <stop offset="50%" stop-color="#e0d4c4"/>
      <stop offset="70%" stop-color="#c4b4a0"/>
      <stop offset="100%" stop-color="#8b7355"/>
    </linearGradient>
    
    <!-- Crane yellow -->
    <linearGradient id="craneYellow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4a060"/>
      <stop offset="50%" stop-color="#a08050"/>
      <stop offset="100%" stop-color="#806030"/>
    </linearGradient>
    
    <!-- Steel frame -->
    <linearGradient id="steelFrame" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6b5544"/>
      <stop offset="50%" stop-color="#8b7355"/>
      <stop offset="100%" stop-color="#6b5544"/>
    </linearGradient>
    
    <!-- Ground -->
    <linearGradient id="groundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b8a892"/>
      <stop offset="100%" stop-color="#9a8a7a"/>
    </linearGradient>
    
    <!-- Filters -->
    <filter id="buildingShadow" x="-50%" y="-30%" width="200%" height="160%">
      <feDropShadow dx="8" dy="12" stdDeviation="15" flood-color="#3a2a1a" flood-opacity="0.35"/>
    </filter>
    
    <filter id="craneShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#3a2a1a" flood-opacity="0.25"/>
    </filter>
    
    <filter id="windowGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Concrete texture -->
    <pattern id="concreteTexture" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#d4c4b0"/>
      <circle cx="2" cy="2" r="0.6" fill="#c4b4a0" opacity="0.4"/>
      <circle cx="6" cy="5" r="0.5" fill="#b8a892" opacity="0.3"/>
      <circle cx="4" cy="7" r="0.4" fill="#c4b4a0" opacity="0.2"/>
    </pattern>
    
    <!-- Brick pattern -->
    <pattern id="brickPattern" patternUnits="userSpaceOnUse" width="24" height="12">
      <rect width="24" height="12" fill="#a08060"/>
      <line x1="0" y1="6" x2="24" y2="6" stroke="#8b7355" stroke-width="1"/>
      <line x1="12" y1="0" x2="12" y2="6" stroke="#8b7355" stroke-width="1"/>
      <line x1="0" y1="6" x2="0" y2="12" stroke="#8b7355" stroke-width="1"/>
      <line x1="6" y1="6" x2="6" y2="12" stroke="#8b7355" stroke-width="1"/>
      <line x1="18" y1="6" x2="18" y2="12" stroke="#8b7355" stroke-width="1"/>
    </pattern>
    
    <!-- Ground shadow -->
    <radialGradient id="groundShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a2a1a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3a2a1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="440" height="420" fill="url(#skyGradient)"/>

  <!-- Ground shadow -->
  <ellipse cx="210" cy="330" rx="165" ry="18" fill="url(#groundShadow)"/>

  <!-- Ground Plane -->
  <rect x="0" y="330" width="440" height="90" fill="url(#groundGradient)"/>
  <rect x="20" y="325" width="400" height="8" fill="#8b7355"/>
  <rect x="20" y="328" width="400" height="3" fill="#6b5544"/>

  <!-- ============== BUILDING 1 (Left) - CONCRETE/BEIGE ============== -->
  <g filter="url(#buildingShadow)">
    <!-- Side face -->
    <path d="M55 320 L55 90 L100 60 L100 320 Z" fill="url(#concreteSide)"/>
    
    <!-- Main facade -->
    <rect x="100" y="60" width="115" height="260" fill="url(#concreteFacade)" rx="3"/>
    
    <!-- Concrete texture overlay -->
    <rect x="100" y="60" width="115" height="260" fill="url(#concreteTexture)" opacity="0.3"/>
    
    <!-- Roof -->
    <path d="M95 60 L157.5 25 L215 60 L157.5 75 Z" fill="url(#roofBeige)"/>
    <path d="M100 60 L157.5 30 L210 60 L157.5 70 Z" fill="#8b7355"/>
    <line x1="100" y1="58" x2="215" y2="58" stroke="#a08060" stroke-width="1.5"/>
    
    <!-- Floor divisions -->
    <g stroke="#b8a892" stroke-width="0.5" opacity="0.6">
      <line x1="100" y1="115" x2="215" y2="115"/>
      <line x1="100" y1="160" x2="215" y2="160"/>
      <line x1="100" y1="205" x2="215" y2="205"/>
      <line x1="100" y1="250" x2="215" y2="250"/>
      <line x1="100" y1="295" x2="215" y2="295"/>
    </g>
    
    <!-- Windows - detailed -->
    <!-- Floor 5 -->
    <rect x="112" y="72" width="20" height="36" fill="url(#windowWarm)" rx="2" filter="url(#windowGlow)"/>
    <rect x="112" y="72" width="20" height="8" fill="#f5f0eb" opacity="0.4"/>
    <rect x="140" y="72" width="20" height="36" fill="url(#windowDark)" rx="2"/>
    <rect x="168" y="72" width="20" height="36" fill="url(#windowLit)" rx="2" filter="url(#windowGlow)"/>
    <rect x="168" y="72" width="20" height="8" fill="#f5f0eb" opacity="0.4"/>
    <rect x="196" y="72" width="12" height="36" fill="url(#windowDark)" rx="2"/>
    
    <!-- Floor 4 -->
    <rect x="112" y="118" width="20" height="36" fill="url(#windowDark)" rx="2"/>
    <rect x="140" y="118" width="20" height="36" fill="url(#windowWarm)" rx="2" filter="url(#windowGlow)"/>
    <rect x="140" y="118" width="20" height="8" fill="#f5f0eb" opacity="0.4"/>
    <rect x="168" y="118" width="20" height="36" fill="url(#windowDark)" rx="2"/>
    <rect x="196" y="118" width="12" height="36" fill="url(#windowWarm)" rx="2" filter="url(#windowGlow)"/>
    <rect x="196" y="118" width="12" height="8" fill="#f5f0eb" opacity="0.4"/>
    
    <!-- Floor 3 -->
    <rect x="112" y="164" width="20" height="36" fill="url(#windowWarm)" rx="2" filter="url(#windowGlow)"/>
    <rect x="112" y="164" width="20" height="8" fill="#f5f0eb" opacity="0.4"/>
    <rect x="140" y="164" width="20" height="36" fill="url(#windowDark)" rx="2"/>
    <rect x="168" y="164" width="20" height="36" fill="url(#windowWarm)" rx="2" filter="url(#windowGlow)"/>
    <rect x="168" y="164" width="20" height="8" fill="#f5f0eb" opacity="0.4"/>
    <rect x="196" y="164" width="12" height="36" fill="url(#windowDark)" rx="2"/>
    
    <!-- Floor 2 -->
    <rect x="112" y="210" width="20" height="36" fill="url(#windowDark)" rx="2"/>
    <rect x="140" y="210" width="20" height="36" fill="url(#windowWarm)" rx="2" filter="url(#windowGlow)"/>
    <rect x="168" y="210" width="20" height="36" fill="url(#windowDark)" rx="2"/>
    <rect x="196" y="210" width="12" height="36" fill="url(#windowWarm)" rx="2" filter="url(#windowGlow)"/>
    <rect x="196" y="210" width="12" height="8" fill="#f5f0eb" opacity="0.4"/>
    
    <!-- Floor 1 -->
    <rect x="112" y="256" width="20" height="36" fill="url(#windowWarm)" rx="2" filter="url(#windowGlow)"/>
    <rect x="112" y="256" width="20" height="8" fill="#f5f0eb" opacity="0.4"/>
    <rect x="140" y="256" width="20" height="36" fill="url(#windowWarm)" rx="2" filter="url(#windowGlow)"/>
    <rect x="168" y="256" width="20" height="36" fill="url(#windowDark)" rx="2"/>
    <rect x="196" y="256" width="12" height="36" fill="url(#windowWarm)" rx="2" filter="url(#windowGlow)"/>
    <rect x="196" y="256" width="12" height="8" fill="#f5f0eb" opacity="0.4"/>
    
    <!-- Entrance -->
    <rect x="143" y="298" width="35" height="22" fill="#5a4a3a" rx="2"/>
    <rect x="148" y="301" width="25" height="16" fill="url(#windowWarm)" rx="1"/>
    <line x1="160.5" y1="301" x2="160.5" y2="317" stroke="#5a4a3a" stroke-width="1.5"/>
    
    <!-- Side face windows -->
    <rect x="60" y="100" width="14" height="28" fill="url(#windowDark)" rx="1"/>
    <rect x="60" y="138" width="14" height="28" fill="url(#windowWarm)" rx="1" filter="url(#windowGlow)"/>
    <rect x="60" y="176" width="14" height="28" fill="url(#windowDark)" rx="1"/>
    <rect x="60" y="214" width="14" height="28" fill="url(#windowWarm)" rx="1" filter="url(#windowGlow)"/>
    <rect x="60" y="252" width="14" height="28" fill="url(#windowDark)" rx="1"/>
    <rect x="60" y="290" width="14" height="28" fill="url(#windowWarm)" rx="1" filter="url(#windowGlow)"/>
  </g>

  <!-- ============== BUILDING 2 (Right) - BRICK/BROWN ============== -->
  <g filter="url(#buildingShadow)">
    <!-- Side face -->
    <path d="M220 320 L220 120 L255 100 L255 320 Z" fill="url(#brickSide)"/>
    
    <!-- Main facade -->
    <rect x="255" y="100" width="100" height="220" fill="url(#brickFacade)" rx="3"/>
    
    <!-- Brick texture overlay -->
    <rect x="255" y="100" width="100" height="220" fill="url(#brickPattern)" opacity="0.4"/>
    
    <!-- Roof -->
    <path d="M250 100 L302.5 70 L350 100 L302.5 112 Z" fill="url(#roofBrown)"/>
    <path d="M255 100 L302.5 75 L345 100 L302.5 107 Z" fill="#5a4030"/>
    
    <!-- Steel frame for under construction -->
    <g stroke="url(#steelFrame)" stroke-width="2.5" fill="none" stroke-linecap="round">
      <line x1="268" y1="100" x2="268" y2="320"/>
      <line x1="288" y1="100" x2="288" y2="320"/>
      <line x1="308" y1="100" x2="308" y2="320"/>
      <line x1="328" y1="100" x2="328" y2="320"/>
      <line x1="345" y1="100" x2="345" y2="320"/>
      
      <line x1="255" y1="125" x2="355" y2="125"/>
      <line x1="255" y1="155" x2="355" y2="155"/>
      <line x1="255" y1="185" x2="355" y2="185"/>
      <line x1="255" y1="215" x2="355" y2="215"/>
      <line x1="255" y1="245" x2="355" y2="245"/>
      <line x1="255" y1="275" x2="355" y2="275"/>
      
      <!-- Cross braces -->
      <line x1="255" y1="125" x2="288" y2="155" stroke-width="1.5"/>
      <line x1="255" y1="155" x2="288" y2="125" stroke-width="1.5"/>
      <line x1="255" y1="185" x2="288" y2="215" stroke-width="1.5"/>
      <line x1="255" y1="215" x2="288" y2="185" stroke-width="1.5"/>
      <line x1="288" y1="215" x2="328" y2="245" stroke-width="1.5"/>
      <line x1="288" y1="245" x2="328" y2="215" stroke-width="1.5"/>
    </g>
    
    <!-- Partially installed windows -->
    <rect x="272" y="133" width="18" height="24" fill="url(#windowWarm)" rx="1" filter="url(#windowGlow)"/>
    <rect x="272" y="163" width="18" height="24" fill="url(#windowDark)" rx="1"/>
    <rect x="272" y="223" width="18" height="24" fill="url(#windowWarm)" rx="1" filter="url(#windowGlow)"/>
    <rect x="292" y="223" width="18" height="24" fill="url(#windowWarm)" rx="1" filter="url(#windowGlow)"/>
    <rect x="272" y="253" width="18" height="24" fill="url(#windowDark)" rx="1"/>
    
    <!-- Concrete floor edges -->
    <g fill="#6b5544" opacity="0.5">
      <rect x="253" y="123" width="104" height="3"/>
      <rect x="253" y="153" width="104" height="3"/>
      <rect x="253" y="183" width="104" height="3"/>
      <rect x="253" y="213" width="104" height="3"/>
      <rect x="253" y="243" width="104" height="3"/>
      <rect x="253" y="273" width="104" height="3"/>
    </g>
  </g>

  <!-- ============== CRANE ============== -->
  <g filter="url(#craneShadow)">
    <!-- Crane mast -->
    <rect x="355" y="25" width="12" height="220" fill="url(#craneSteel)"/>
    
    <!-- Mast rungs -->
    <g stroke="#8b7355" stroke-width="1">
      <line x1="357" y1="45" x2="365" y2="45"/>
      <line x1="357" y1="65" x2="365" y2="65"/>
      <line x1="357" y1="85" x2="365" y2="85"/>
      <line x1="357" y1="105" x2="365" y2="105"/>
      <line x1="357" y1="125" x2="365" y2="125"/>
      <line x1="357" y1="145" x2="365" y2="145"/>
      <line x1="357" y1="165" x2="365" y2="165"/>
      <line x1="357" y1="185" x2="365" y2="185"/>
      <line x1="357" y1="205" x2="365" y2="205"/>
    </g>
    
    <!-- Crane jib -->
    <rect x="245" y="25" width="120" height="8" fill="url(#craneSteel)"/>
    
    <!-- Jib truss -->
    <g stroke="#8b7355" stroke-width="0.75">
      <line x1="260" y1="25" x2="260" y2="33"/>
      <line x1="280" y1="25" x2="280" y2="33"/>
      <line x1="300" y1="25" x2="300" y2="33"/>
      <line x1="320" y1="25" x2="320" y2="33"/>
      <line x1="340" y1="25" x2="340" y2="33"/>
    </g>
    
    <!-- Counterweight -->
    <rect x="245" y="33" width="25" height="15" fill="#6b5544" rx="2"/>
    <rect x="248" y="36" width="19" height="9" fill="#5a4030"/>
    
    <!-- Cabin -->
    <rect x="358" y="8" width="14" height="20" fill="#5a4030" rx="2"/>
    <rect x="360" y="11" width="10" height="10" fill="url(#windowWarm)" rx="1" opacity="0.8"/>
    
    <!-- Trolley -->
    <rect x="300" y="18" width="18" height="8" fill="#8b7355"/>
    <rect x="304" y="14" width="10" height="5" fill="#6b5544"/>
    
    <!-- Cable -->
    <line x1="309" y1="26" x2="309" y2="75" stroke="#8b7355" stroke-width="2.5"/>
    
    <!-- Hook -->
    <rect x="303" y="75" width="12" height="10" fill="url(#craneYellow)" rx="2"/>
    <path d="M300 85 L309 93 L318 85" stroke="url(#craneYellow)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Support cables -->
    <line x1="275" y1="12" x2="275" y2="25" stroke="#9a8a7a" stroke-width="1.5"/>
    <line x1="300" y1="7" x2="300" y2="25" stroke="#9a8a7a" stroke-width="1.5"/>
    <line x1="325" y1="12" x2="325" y2="25" stroke="#9a8a7a" stroke-width="1.5"/>
  </g>

  <!-- ============== TEXT BELOW ============== -->
  <text x="220" y="375" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="32" 
        font-weight="600" 
        fill="#5a4030" 
        text-anchor="middle"
        letter-spacing="-0.01em">
    Alpendre da Falésia
  </text>
  
  <text x="220" y="402" 
        font-family="'Helvetica Neue', Arial, sans-serif" 
        font-size="11" 
        font-weight="500" 
        fill="#8b7355" 
        text-anchor="middle"
        letter-spacing="0.1em">
    CONSTRUÇÃO, COMPRA E VENDA DE IMÓVEIS
  </text>

</svg>